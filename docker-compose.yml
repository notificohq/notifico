services:
  notifico:
    build: .
    ports:
      - "8000:8000"
    environment:
      RUST_LOG: info
      NOTIFICO_DATABASE_URL: "postgres://notifico:notifico@postgres:5432/notifico"
      NOTIFICO_SERVER_MODE: all
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: notifico
      POSTGRES_PASSWORD: notifico
      POSTGRES_DB: notifico
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifico"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
